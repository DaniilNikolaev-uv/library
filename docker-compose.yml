services:
  archerion_db:
    image: postgres:16  
    container_name: archerion_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"               
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archerion
  archerion_minio:
    image: quay.io/minio/minio:latest
    container_name: archerion_minio
    env_file:
      - .env
    ports:
      - "9000:9000"    # API port
      - "9001:9001"    # Web Console port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      archerion:
        aliases:
          - archerion-minio
  archerion_backend: 
    container_name: archerion_backend
    build: backend/.
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      archerion_db:
        condition: service_healthy
      archerion_minio:
        condition: service_healthy
      archerion_migrate:
        condition: service_completed_successfully
    networks:
      archerion:
        aliases:
          - archerion-backend

  archerion_migrate:
    container_name: archerion_migrate
    build: backend/.
    env_file:
      - backend/.env
    command: ["python", "manage.py", "migrate", "--noinput"]
    depends_on:
      archerion_db:
        condition: service_healthy
    restart: "no"
    networks:
      - archerion

  archerion_frontend:
    container_name: archerion_frontend
    build: frontend/.
    environment:
      # Frontend talks to the backend via the published API port in local/demo mode.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      archerion_backend:
        condition: service_started
    networks:
      archerion:
        aliases:
          - archerion-frontend

  

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin_archerion
      restart: always
      env_file:
        - .env
      environment:
        PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
        PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      ports:
        - "5050:80"
      volumes:
        - pgadmin_data:/var/lib/pgadmin
      depends_on:
        - archerion_db
      networks:
        - archerion

  archerion_healthcheck:
    build: healthcheck/.
    container_name: archerion_healthcheck
    env_file:
      - .env
    environment:
      # Healthcheck resolves services by compose network aliases.
      HEALTHCHECK_BACKEND_URL: http://archerion-backend:8000
      HEALTHCHECK_FRONTEND_URL: http://archerion-frontend:3000
      HEALTHCHECK_BACKEND_HEALTH_URL: http://archerion-backend:8000/swagger/
      HEALTHCHECK_MINIO_API_URL: http://archerion-minio:9000/minio/health/live
      HEALTHCHECK_MINIO_CONSOLE_URL: http://archerion-minio:9001/
      HEALTHCHECK_PGADMIN_URL: http://pgadmin:80/
      HEALTHCHECK_POSTGRES_HOST: archerion_db
      HEALTHCHECK_POSTGRES_PORT: "5432"
      HEALTHCHECK_SESSION_SECRET: ${HEALTHCHECK_SESSION_SECRET}
      HEALTHCHECK_SECURE_COOKIES: "false"
      HEALTHCHECK_LOG_TAIL_LINES: "80"
    ports:
      - "8085:8085"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - archerion_backend
      - archerion_frontend
      - archerion_db
      - archerion_minio
      - pgadmin
    networks:
      archerion:
        aliases:
          - archerion-healthcheck
      
volumes:
  pgdata:
  pgadmin_data:
  minio:

networks:
  archerion:
